name: SEO CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  seo-regression-tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Run SEO regression tests (production base)
        env:
          SEO_BASE_URL: https://reviewhunts.com
        run: bunx vitest run src/test/seo
      - name: Run SEO regression tests (staging/preview base)
        env:
          SEO_BASE_URL: https://id-preview--example.lovable.app
        run: bunx vitest run src/test/seo/routes-seo.test.tsx

  lighthouse-ci:
    runs-on: ubuntu-latest
    needs: seo-regression-tests
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run build
      - name: Run Lighthouse CI
        run: bunx lhci autorun --config=./lighthouserc.json
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}

  playwright-seo-smoke:
    runs-on: ubuntu-latest
    needs: seo-regression-tests
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium
      - name: Playwright SEO smoke (staging)
        env:
          STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL || 'https://id-preview--8f8ab8bf-14f5-4085-9849-266b90f727c8.lovable.app' }}
        run: bunx playwright test tests/e2e/seo-smoke.spec.ts
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report-smoke
          path: playwright-report

  # ---------------------------------------------------------------
  # Merge-blocking gate. Runs the structural SEO Playwright suites
  # (sitemap/robots, canonical consistency, JSON-LD validation)
  # against staging. Required check in branch protection rules —
  # PRs cannot merge while this job is red.
  # ---------------------------------------------------------------
  seo-merge-gate:
    name: SEO merge gate (required)
    runs-on: ubuntu-latest
    needs: seo-regression-tests
    timeout-minutes: 20
    env:
      STAGING_BASE_URL: ${{ secrets.STAGING_BASE_URL || 'https://id-preview--8f8ab8bf-14f5-4085-9849-266b90f727c8.lovable.app' }}
      # Tee console output so we can upload a job-level log artifact even
      # if Playwright itself crashes before generating per-test attachments.
      PW_CONSOLE_LOG: ${{ github.workspace }}/playwright-console.log
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bunx playwright install --with-deps chromium

      - name: sitemap.xml + robots.txt directives
        run: bunx playwright test tests/e2e/sitemap-robots.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: Canonical / OG consistency across reload + SPA nav
        if: always()
        run: bunx playwright test tests/e2e/canonical-consistency.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: JSON-LD validation across paginated + filtered views
        if: always()
        run: bunx playwright test tests/e2e/jsonld-validation.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: Canonical slug + listing-pagination correctness
        if: always()
        run: bunx playwright test tests/e2e/canonical-slug.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: og:image presence + reachability
        if: always()
        run: bunx playwright test tests/e2e/og-image.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: sitemap URL liveness + redirect canonical match
        if: always()
        run: bunx playwright test tests/e2e/sitemap-liveness.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: Broad product + blog detail canonical/JSON-LD coverage
        if: always()
        env:
          SEO_BROAD_PRODUCT_COUNT: "5"
          SEO_BROAD_BLOG_COUNT: "5"
        run: bunx playwright test tests/e2e/broad-detail-coverage.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      - name: Extended smoke — subcategories + deep blog pagination
        if: always()
        env:
          SEO_SMOKE_BLOG_DEPTH: "4"
        run: bunx playwright test tests/e2e/seo-smoke-extended.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      # Mocked og:image checks — intercepts every image request and
      # returns 200 PNG, so we only fail on bad META, not staging CDN.
      - name: og:image META validation (network mocked)
        if: always()
        env:
          CI_MOCK_OG_IMAGES: "1"
        run: bunx playwright test tests/e2e/og-image-mocked.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"

      # Fully mocked smoke — images + sitemap.xml + robots.txt all
      # served as deterministic 200s. Surfaces META/structure bugs
      # without staging-CDN noise.
      - name: SEO smoke (all staging assets mocked)
        if: always()
        env:
          CI_MOCK_STAGING_ASSETS: "1"
        run: bunx playwright test tests/e2e/seo-smoke-mocked.spec.ts 2>&1 | tee -a "$PW_CONSOLE_LOG"






      # ----- Lighthouse CI against staging homepage + a real product page -----
      # Pulls the first /product/<slug> URL out of the live sitemap so the
      # audit covers a representative detail page (not a fixture).
      - name: Resolve a sample staging product URL
        if: always()
        id: sample
        run: |
          set -euo pipefail
          SITEMAP="$(curl -fsSL --max-time 15 "$STAGING_BASE_URL/sitemap.xml" || true)"
          PRODUCT_URL="$(printf '%s' "$SITEMAP" \
            | grep -oE '<loc>[^<]+</loc>' \
            | sed -E 's#</?loc>##g' \
            | grep -E '/product/[A-Za-z0-9_-]+$' \
            | head -n1 || true)"
          if [ -z "$PRODUCT_URL" ]; then
            echo "::warning::No /product/<slug> URL in sitemap; falling back to /products"
            PRODUCT_URL="$STAGING_BASE_URL/products"
          fi
          echo "product_url=$PRODUCT_URL" >> "$GITHUB_OUTPUT"
          echo "Sample product URL: $PRODUCT_URL"

      - name: Render lighthouserc with staging URLs
        if: always()
        run: |
          sed \
            -e "s#STAGING_HOMEPAGE_PLACEHOLDER#${STAGING_BASE_URL%/}/#" \
            -e "s#STAGING_PRODUCT_PLACEHOLDER#${{ steps.sample.outputs.product_url }}#" \
            lighthouserc.merge-gate.json > lighthouserc.merge-gate.rendered.json
          cat lighthouserc.merge-gate.rendered.json

      - name: Lighthouse CI (homepage + product)
        if: always()
        env:
          LHCI_GITHUB_APP_TOKEN: ${{ secrets.LHCI_GITHUB_APP_TOKEN }}
          LHCI_CONSOLE_LOG: ${{ github.workspace }}/lighthouse-console.log
        run: |
          set -o pipefail
          bunx lhci autorun --config=./lighthouserc.merge-gate.rendered.json 2>&1 \
            | tee -a "$LHCI_CONSOLE_LOG" \
            | tee -a "$PW_CONSOLE_LOG"

      # Raw .lighthouseci dir — contains lhr-*.json (full audit JSON),
      # manifest.json, and HTML reports. Always upload so a red merge
      # gate is debuggable from the GitHub Actions UI.
      - name: Upload Lighthouse reports (HTML + raw JSON)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-report-merge-gate
          path: |
            .lighthouseci/**/*.json
            .lighthouseci/**/*.html
            .lighthouseci/**/*.txt
          if-no-files-found: ignore
          retention-days: 14

      - name: Upload Lighthouse console log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-console-log-merge-gate
          path: ${{ github.workspace }}/lighthouse-console.log
          if-no-files-found: ignore
          retention-days: 14



      # Always upload the full Playwright HTML report so failures are
      # diagnosable from the GitHub Actions UI without re-running.
      - name: Upload Playwright HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-merge-gate
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 14

      # Per-test traces, screenshots, attached HTML / JSON-LD / console logs.
      - name: Upload Playwright test-results (traces + attachments)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results-merge-gate
          path: test-results
          if-no-files-found: ignore
          retention-days: 14

      # Job-level console capture (stdout/stderr of every step above).
      - name: Upload aggregated console log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-console-log-merge-gate
          path: ${{ env.PW_CONSOLE_LOG }}
          if-no-files-found: ignore
          retention-days: 14

  # ---------------------------------------------------------------
  # Per-PR dashboard: posts a sticky comment summarizing the latest
  # SEO CI status, Lighthouse scores (perf / SEO / a11y / best-pract),
  # and Playwright pass/fail counts. Updates in place on every push
  # so reviewers always see fresh numbers without scrolling artifacts.
  # ---------------------------------------------------------------
  seo-ci-dashboard:
    name: SEO CI dashboard
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [seo-regression-tests, lighthouse-ci, playwright-seo-smoke, seo-merge-gate]
    permissions:
      pull-requests: write
      actions: read
    steps:
      - uses: actions/checkout@v4

      - name: Download Lighthouse reports
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: lighthouse-report-merge-gate
          path: lh-artifacts
        continue-on-error: true

      - name: Download Playwright test-results
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: playwright-test-results-merge-gate
          path: pw-artifacts
        continue-on-error: true

      - name: Build dashboard markdown
        id: build
        if: always()
        run: |
          set +e
          node <<'NODE' > dashboard.md
          const fs = require('fs');
          const path = require('path');

          function walk(dir) {
            const out = [];
            if (!fs.existsSync(dir)) return out;
            for (const entry of fs.readdirSync(dir, { withFileTypes: true })) {
              const p = path.join(dir, entry.name);
              if (entry.isDirectory()) out.push(...walk(p));
              else out.push(p);
            }
            return out;
          }

          // ---- Lighthouse: read every lhr-*.json, extract category scores ----
          const lhFiles = walk('lh-artifacts').filter(f => /lhr-.*\.json$/.test(f));
          const lhRows = [];
          for (const f of lhFiles) {
            try {
              const j = JSON.parse(fs.readFileSync(f, 'utf8'));
              const cats = j.categories || {};
              const fmt = (k) => cats[k]?.score != null ? Math.round(cats[k].score * 100) : '—';
              lhRows.push({
                url: j.finalDisplayedUrl || j.requestedUrl || path.basename(f),
                perf: fmt('performance'),
                seo: fmt('seo'),
                a11y: fmt('accessibility'),
                bp: fmt('best-practices'),
              });
            } catch {}
          }

          // ---- Playwright: count pass/fail from .last-run.json + results ----
          let pwPassed = 0, pwFailed = 0, pwFlaky = 0, pwSkipped = 0;
          const failedSpecs = new Set();
          const pwFiles = walk('pw-artifacts');
          for (const f of pwFiles) {
            if (path.basename(f) === '.last-run.json') {
              try {
                const j = JSON.parse(fs.readFileSync(f, 'utf8'));
                for (const t of (j.failedTests || [])) failedSpecs.add(t);
              } catch {}
            }
          }
          // Heuristic counts from directory naming (Playwright writes one
          // dir per test attempt; "-retry" suffix = flake).
          const testDirs = new Set();
          for (const f of pwFiles) {
            const rel = path.relative('pw-artifacts', f);
            const top = rel.split(path.sep)[0];
            if (top && top !== '.last-run.json') testDirs.add(top);
          }
          for (const d of testDirs) {
            if (d.includes('-failed') || failedSpecs.size) pwFailed++;
            else if (d.includes('-retry')) pwFlaky++;
            else pwPassed++;
          }

          const lines = [];
          lines.push('<!-- seo-ci-dashboard -->');
          lines.push('## SEO CI Dashboard');
          lines.push('');
          lines.push(`Run: [#${process.env.GITHUB_RUN_ID}](${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}) · commit \`${(process.env.GITHUB_SHA||'').slice(0,7)}\``);
          lines.push('');
          lines.push('### Lighthouse');
          if (lhRows.length === 0) {
            lines.push('_No Lighthouse reports available (job skipped or failed early)._');
          } else {
            lines.push('| URL | Perf | SEO | A11y | Best Practices |');
            lines.push('|---|---:|---:|---:|---:|');
            for (const r of lhRows) {
              lines.push(`| \`${r.url}\` | ${r.perf} | ${r.seo} | ${r.a11y} | ${r.bp} |`);
            }
          }
          lines.push('');
          lines.push('### Playwright (merge gate)');
          lines.push(`- Passed: **${pwPassed}**`);
          lines.push(`- Failed: **${pwFailed}**`);
          lines.push(`- Flaky:  **${pwFlaky}**`);
          if (failedSpecs.size) {
            lines.push('');
            lines.push('Failed tests:');
            for (const t of failedSpecs) lines.push(`- \`${t}\``);
            lines.push('');
            const dispatchUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/workflows/seo-rerun-failed.yml`;
            lines.push('### Rerun failed specs (one click)');
            lines.push('');
            lines.push(`Comment on this PR to dispatch the rerun workflow:`);
            lines.push('');
            lines.push('- `/rerun-failed` — rerun only the failed specs from this run');
            lines.push('- `/rerun-failed mock` — rerun with og:image / staging assets mocked');
            lines.push('');
            lines.push(`Or [open the workflow UI](${dispatchUrl}) and supply \`previous_run_id=${process.env.GITHUB_RUN_ID}\` manually.`);
          }
          lines.push('');
          lines.push('See [CI SEO failure guide](../blob/' + (process.env.GITHUB_SHA||'main') + '/docs/ci-seo-failure-guide.md) for fix recipes.');
          process.stdout.write(lines.join('\n'));
          NODE

      # ---- History + flake quarantine maintenance ----
      - name: Download previous history
        if: always()
        uses: dawidd6/action-download-artifact@v6
        with:
          name: seo-ci-history
          workflow: seo-ci.yml
          branch: main
          path: .
          if_no_artifact_found: warn

      - name: Collect Playwright merged JSON results
        if: always()
        uses: actions/download-artifact@v4
        with:
          name: playwright-test-results-merge-gate
          path: pw-merged-results
        continue-on-error: true

      - name: Record run into history
        if: always()
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: node .github/scripts/record-run-history.mjs

      - name: Update flaky-test quarantine
        if: always()
        run: node .github/scripts/update-quarantine.mjs

      - name: Render history block
        if: always()
        env:
          HISTORY_VIEW_N: "10"
        run: node .github/scripts/render-history-block.mjs

      - name: Compose final dashboard
        if: always()
        run: |
          cat dashboard.md > final-dashboard.md
          echo "" >> final-dashboard.md
          [ -f history-block.md ] && cat history-block.md >> final-dashboard.md || true
          echo "" >> final-dashboard.md
          [ -f quarantine-changes.md ] && cat quarantine-changes.md >> final-dashboard.md || true

      - name: Upload updated history (for next run)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: seo-ci-history
          path: .ci-history/spec-history.json
          retention-days: 90

      - name: Upload updated quarantine.json (audit trail)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: quarantine-snapshot
          path: tests/e2e/quarantine.json
          retention-days: 90

      - name: Post / update PR dashboard comment
        if: always()
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: seo-ci-dashboard
          path: final-dashboard.md

