name: db-perf-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run hourly so latency regressions are caught even without code changes.
    - cron: "0 * * * *"

jobs:
  db-perf-smoke:
    name: Database performance smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run db-perf-smoke
        id: smoke
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          PERF_REPORT_DIR: perf-smoke-report
          PERF_ENV: ci
        run: bun run test:perf

      - name: Upload perf report artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report
          path: perf-smoke-report/
          if-no-files-found: warn

      - name: Comment on PR with breaching queries
        if: github.event_name == 'pull_request' && steps.smoke.outcome == 'failure'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: db-perf-smoke
          path: perf-smoke-report/perf-smoke-summary.md

      - name: Fail the job if smoke test failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
