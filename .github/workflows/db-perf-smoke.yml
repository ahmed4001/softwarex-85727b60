name: db-perf-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Only lint perf-thresholds.json and print the resolved profile (skip EXPLAIN ANALYZE)."
        type: boolean
        default: false
      apply_suggestions:
        description: "Apply suggested mean_ms/max_ms updates back into perf-thresholds.json and attach a ready-to-commit diff."
        type: boolean
        default: false
      coverage_strict:
        description: "Fail the build when a hot query has no matching threshold rule."
        type: boolean
        default: false
      max_change_pct:
        description: "Cap how much apply-suggestions may change mean_ms/max_ms per run (e.g. 25 = ±25%). Empty = no cap."
        type: string
        default: ""
  schedule:
    # Run hourly so latency regressions are caught even without code changes.
    - cron: "0 * * * *"

jobs:
  db-perf-smoke:
    name: Database performance smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
        with:
          # Need base branch history so the runner can diff perf-thresholds.json
          # against origin/${{ github.base_ref }} on pull requests.
          fetch-depth: 0

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Lint perf thresholds (resolve PERF_ENV profile)
        env:
          PERF_ENV: ci
        run: bun run lint:perf-thresholds ${{ (github.event_name == 'workflow_dispatch' && inputs.dry_run) && '-- --dry-run' || '' }}

      - name: Run db-perf-smoke
        id: smoke
        if: ${{ !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        continue-on-error: true
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
          PERF_REPORT_DIR: perf-smoke-report
          PERF_ENV: ci
          PERF_APPLY_SUGGESTIONS: ${{ (github.event_name == 'workflow_dispatch' && inputs.apply_suggestions) && '1' || '0' }}
          PERF_COVERAGE_STRICT: ${{ (github.event_name == 'workflow_dispatch' && inputs.coverage_strict) && '1' || '0' }}
        run: bun run test:perf

      - name: Upload perf report artifact
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-report
          path: |
            perf-smoke-report/perf-smoke-report.json
            perf-smoke-report/perf-smoke-summary.md
            perf-smoke-report/perf-smoke-resolved-profile.json
            perf-smoke-report/perf-thresholds.diff.patch
          if-no-files-found: warn

      - name: Upload resolved profile artifact
        if: ${{ always() && !(github.event_name == 'workflow_dispatch' && inputs.dry_run) }}
        uses: actions/upload-artifact@v4
        with:
          name: perf-smoke-resolved-profile
          path: perf-smoke-report/perf-smoke-resolved-profile.json
          if-no-files-found: warn

      - name: Comment on PR with breaching queries
        if: github.event_name == 'pull_request' && steps.smoke.outcome == 'failure'
        uses: marocchino/sticky-pull-request-comment@v2
        with:
          header: db-perf-smoke
          path: perf-smoke-report/perf-smoke-summary.md

      - name: Fail the job if smoke test failed
        if: steps.smoke.outcome == 'failure'
        run: exit 1
