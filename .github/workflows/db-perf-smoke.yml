name: db-perf-smoke

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:
  schedule:
    # Run hourly so latency regressions are caught even without code changes.
    - cron: "0 * * * *"

jobs:
  db-perf-smoke:
    name: Database performance smoke test
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run db-perf-smoke
        env:
          VITE_SUPABASE_URL: ${{ secrets.VITE_SUPABASE_URL }}
          VITE_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.VITE_SUPABASE_PUBLISHABLE_KEY }}
        run: bun run test:perf
