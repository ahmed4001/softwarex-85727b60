<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <script>
      // Canonical host enforcement. Lovable static hosting can't issue real
      // HTTP 301s, so we redirect non-canonical hosts (e.g. softwarex.lovable.app,
      // id-preview--*.lovable.app) to reviewhunts.com client-side BEFORE the app
      // mounts. Preserves path, query, and hash. Skipped for localhost/dev.
      (function () {
        try {
          var h = location.hostname;
          var isLocal = h === "localhost" || h === "127.0.0.1" || h.endsWith(".local");
          var isCanonical = h === "reviewhunts.com" || h === "www.reviewhunts.com";
          if (!isLocal && !isCanonical) {
            location.replace("https://reviewhunts.com" + location.pathname + location.search + location.hash);
          }
        } catch (e) {}
      })();
    </script>

    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="default" />
    <meta name="format-detection" content="telephone=no" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link rel="preload" as="style" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    <link rel="stylesheet" media="print" onload="this.media='all'" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" />
    <noscript><link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=DM+Sans:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap" /></noscript>
    <link rel="icon" href="/favicon.ico" type="image/x-icon" />
    
    
    <!--
      Per-route head tags (title, description, canonical, og:title/description/image,
      twitter:title/description/image) are owned by SeoHead (react-helmet-async).
      They are intentionally NOT duplicated here — react-helmet-async does not
      remove pre-existing static head tags, so leaving them in caused 1,000+
      "Multiple meta description" and "Open Graph tags incomplete" findings.
      The minimal site-wide fallbacks below are safe because they don't collide
      with per-route tags (no name/property duplication after hydration).
    -->
    <title>ReviewHunts — Discover, Compare & Review the Best Software</title>
    <meta name="description" content="Discover, compare, and review top software tools. Real user reviews, AI-powered insights, and curated buyer guides across 100+ categories." />
    <meta name="author" content="ReviewHunts" />
    <meta name="robots" content="index, follow, max-image-preview:large, max-snippet:160" />
    <meta name="theme-color" content="#4f46e5" />

    <!-- Sitewide og:* / twitter:* defaults (kept minimal; per-route values come from SeoHead). -->
    <meta property="og:type" content="website" />
    <meta property="og:site_name" content="ReviewHunts" />
    <meta property="og:title" content="ReviewHunts — Discover, Compare & Review the Best Software" />
    <meta property="og:description" content="Discover, compare, and review top software tools. Real user reviews, AI-powered insights, and curated buyer guides across 100+ categories." />
    <meta property="og:url" content="https://reviewhunts.com/" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:site" content="@ReviewHunts" />
    <meta property="og:image" content="https://reviewhunts.com/og-image.png" />

    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"Organization","name":"ReviewHunts","url":"https://reviewhunts.com/","logo":"https://reviewhunts.com/reviewhunts-logo.png","sameAs":["https://twitter.com/ReviewHunts"]}
    </script>
    <script type="application/ld+json">
      {"@context":"https://schema.org","@type":"WebSite","name":"ReviewHunts","url":"https://reviewhunts.com/","potentialAction":{"@type":"SearchAction","target":{"@type":"EntryPoint","urlTemplate":"https://reviewhunts.com/search?q={search_term_string}"},"query-input":"required name=search_term_string"}}
    </script>

  <!-- Google tag (gtag.js) - deferred to avoid blocking LCP -->
  <script>
    window.addEventListener('load', function() {
      var s = document.createElement('script');
      s.async = true;
      s.src = 'https://www.googletagmanager.com/gtag/js?id=G-CYJDR8BBKJ';
      document.head.appendChild(s);
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      window.gtag = gtag;
      gtag('js', new Date());
      gtag('config', 'G-CYJDR8BBKJ');
    });
  </script>

  <!-- Paddle.js + iubenda - loaded after page load to keep mobile LCP fast -->
  <script>
    window.addEventListener('load', function() {
      var _iub = window._iub = window._iub || [];
      _iub.csConfiguration = {"siteId":4551587,"cookiePolicyId":49810184,"lang":"en","storage":{"useSiteId":true},"whitelist":["paddle.com","cdn.paddle.com"]};
      function add(src, attrs){var s=document.createElement('script');s.src=src;Object.assign(s,attrs||{});document.head.appendChild(s);}
      add('https://cdn.paddle.com/paddle/v2/paddle.js', {defer:true, onload:function(){window.__paddleLoaded=true;}, onerror:function(){window.__paddleLoadError='load failed';}});
      add('https://cs.iubenda.com/autoblocking/4551587.js', {async:true});
      add('//cdn.iubenda.com/cs/gpp/stub.js', {defer:true});
      add('//cdn.iubenda.com/cs/iubenda_cs.js', {async:true, charset:'UTF-8'});
    });
  </script>
</head>

  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
